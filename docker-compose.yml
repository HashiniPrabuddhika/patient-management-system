services:

  auth-db:
    image: postgres:15-alpine
    container_name: auth-db
    environment:
      POSTGRES_DB: auth-service-db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - auth-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  patient-db:
    image: postgres:15-alpine
    container_name: patient-db
    environment:
      POSTGRES_DB: patient-service-db
      POSTGRES_USER: admin_user
      POSTGRES_PASSWORD: password
    ports:
      - "5434:5432"
    volumes:
      - patient-db-data:/var/lib/postgresql/data
    restart: unless-stopped

  zookeeper:
    image: zookeeper:3.8
    container_name: zookeeper
    ports:
      - "2181:2181"
    environment:
      ZOO_MY_ID: 1
      ZOO_PORT: 2181
    restart: unless-stopped

  kafka:
    image: apache/kafka:3.7.0
    container_name: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: true
    restart: unless-stopped

  auth-service:
    image: ghcr.io/hashiniprabuddhika/auth-service:latest
    container_name: auth-service
    ports:
      - "8085:8085"
    depends_on:
      - auth-db
    environment:
      SPRING_APPLICATION_NAME: auth-service
      SERVER_PORT: 8085
      SPRING_DATASOURCE_URL: jdbc:postgresql://auth-db:5432/auth-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      JWT_SECRET: Y2hhVEc3aHJnb0hYTzMyZ2ZqVkpiZ1RkZG93YWxrUkM=
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: 60000
    restart: on-failure

  billing-service:
    image: ghcr.io/hashiniprabuddhika/billing-service:latest
    container_name: billing-service
    ports:
      - "8081:8081"
      - "9001:9001"
    environment:
      SPRING_APPLICATION_NAME: billing-service
      SERVER_PORT: 8081
      GRPC_SERVER_PORT: 9001
    restart: on-failure

  patient-service:
    image: ghcr.io/hashiniprabuddhika/patient-service:latest
    container_name: patient-service
    ports:
      - "8080:8080"
    depends_on:
      - patient-db
      - billing-service
      - kafka
    environment:
      SPRING_APPLICATION_NAME: patient-service
      SERVER_PORT: 8080
      SPRING_DATASOURCE_URL: jdbc:postgresql://patient-db:5432/patient-service-db
      SPRING_DATASOURCE_USERNAME: admin_user
      SPRING_DATASOURCE_PASSWORD: password
      SPRING_JPA_HIBERNATE_DDL_AUTO: update
      SPRING_SQL_INIT_MODE: always
      BILLING_SERVICE_ADDRESS: billing-service
      BILLING_SERVICE_GRPC_PORT: 9001
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      SPRING_DATASOURCE_HIKARI_CONNECTION_TIMEOUT: 30000
      SPRING_DATASOURCE_HIKARI_INITIALIZATION_FAIL_TIMEOUT: 60000
    restart: on-failure

  analytics-service:
    image: ghcr.io/hashiniprabuddhika/analytics-service:latest
    container_name: analytics-service
    ports:
      - "8082:8082"
    depends_on:
      - kafka
    environment:
      SPRING_APPLICATION_NAME: analytics-service
      SERVER_PORT: 8082
      SPRING_KAFKA_BOOTSTRAP_SERVERS: kafka:9092
    restart: on-failure

  api-gateway:
    image: ghcr.io/hashiniprabuddhika/api-gateway:latest
    container_name: api-gateway
    ports:
      - "8084:8084"
    depends_on:
      - auth-service
      - patient-service
    environment:
      SPRING_APPLICATION_NAME: api-gateway
      SERVER_PORT: 8084
      AUTH_SERVICE_URL: http://auth-service:8085
    restart: on-failure

volumes:
  auth-db-data:
  patient-db-data: