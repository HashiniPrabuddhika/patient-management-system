name: Build and Push Docker Images

on:
  push:
    branches: [ main ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push auth-service
        uses: docker/build-push-action@v5
        with:
          context: ./auth-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/auth-service:latest

      - name: Build and push billing-service
        uses: docker/build-push-action@v5
        with:
          context: ./billing-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/billing-service:latest

      - name: Build and push patient-service
        uses: docker/build-push-action@v5
        with:
          context: ./patient-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/patient-service:latest

      - name: Build and push analytics-service
        uses: docker/build-push-action@v5
        with:
          context: ./analytics-service
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/analytics-service:latest

      - name: Build and push api-gateway
        uses: docker/build-push-action@v5
        with:
          context: ./api-gateway
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/api-gateway:latest
